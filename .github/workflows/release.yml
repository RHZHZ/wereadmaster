name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.publish.outputs.releaseId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # 核心：Tauri 构建发布（自动打包+上传安装包）
      - name: Build and publish Tauri release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_RELEASE_PAT || github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "微信读书个人阅读管理 ${{ inputs.tag_name || github.ref_name }}"
          releaseBody: |
            把微信读书里的阅读记录，沉淀成你的知识资产。

            这是一个本地优先的阅读工作台，统一整理书架、笔记、阅读统计与 AI 复盘，帮助你更清楚地知道接下来读什么、复盘什么、输出什么。

            ## 本次版本

            - 新增微信读书专用网络代理配置，支持 http、https、socks4、socks4a、socks5 和 socks5h 地址。
            - Android 上系统代理不被 Rust 网络栈可靠继承时，可手动填写代理工具提供的本地 HTTP 或 SOCKS 端口。
            - 微信读书代理只作用于同步网关，不影响 AI Provider、模型刷新或应用更新。
            - 微信读书网关初始化和请求失败会返回诊断详情，前端错误信息会附带可排查原因。
            - 诊断导出新增微信读书代理状态，方便定位 Android 网络配置问题。
            - 设置保存命令保留超时保护，避免 Android WebView 中按钮长期停留在“保存中”。
            - 微信读书代理 URL 会拒绝携带用户名或密码，避免把代理凭据写入本地配置。

            ## 更新说明

            - 版本：${{ inputs.tag_name || github.ref_name }}
            - 适用平台：Windows x64 / Android APK
            - 更新方式：Windows 桌面端可在设置 > 应用更新中检查；Android 用户请从 GitHub Release 下载签名 APK。

            ## 回滚

            - 如更新异常，请回退到上一版安装包
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle/nsis"
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $sigFile) {
            Write-Host "NSIS bundle directory contents:"
            Get-ChildItem -Path $bundleDir | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
            throw "Could not find Windows updater signature (*.exe.sig)."
          }

          $release = gh api "repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $exeAsset = $release.assets |
            Where-Object { $_.name -match '\.exe$' } |
            Sort-Object name |
            Select-Object -First 1

          if (-not $exeAsset) {
            Write-Host "Release assets returned by GitHub API:"
            $release.assets | Select-Object name, browser_download_url | Format-Table -AutoSize
            throw "Could not find uploaded Windows installer asset (*.exe) in the GitHub release."
          }

          $version = [string] $release.tag_name
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $notes = [string] $release.body
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "详见 GitHub Release 页面。"
          }

          $pubDate = if ([string]::IsNullOrWhiteSpace($release.published_at)) {
            [DateTime]::UtcNow.ToString("o")
          } else {
            [DateTime]::Parse($release.published_at).ToUniversalTime().ToString("o")
          }

          $latestJsonPath = Join-Path $PWD "src-tauri/target/release/bundle/latest.json"
          $latestJson = [ordered]@{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()
                url = $exeAsset.browser_download_url
              }
            }
          }

          $latestJson | ConvertTo-Json -Depth 10 | Set-Content -Path $latestJsonPath -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content -Path $latestJsonPath

      - name: Upload latest.json to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" "./src-tauri/target/release/bundle/latest.json" --clobber

  # Android 构建任务（签名后上传 APK）
  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    needs: release-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "$ANDROID_KEY_ALIAS" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "$ANDROID_KEY_PASSWORD" ] || missing+=("ANDROID_KEY_PASSWORD")
          [ -n "$ANDROID_STORE_PASSWORD" ] || missing+=("ANDROID_STORE_PASSWORD")
          [ -n "$ANDROID_KEY_BASE64" ] || missing+=("ANDROID_KEY_BASE64")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing Android signing secrets: ${missing[*]}"
            exit 1
          fi

          mkdir -p src-tauri/gen/android
          printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS" > src-tauri/gen/android/keystore.properties
          printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties
          printf 'storePassword=%s\n' "$ANDROID_STORE_PASSWORD" >> src-tauri/gen/android/keystore.properties
          printf '%s' "$ANDROID_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          printf 'storeFile=%s\n' "$RUNNER_TEMP/upload-keystore.jks" >> src-tauri/gen/android/keystore.properties

      - name: Sync Android version from release tag
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Android release tag must use semantic version format, got: $RELEASE_TAG"
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$((major * 1000000 + minor * 1000 + patch))
          {
            echo "// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
            echo "tauri.android.versionName=$VERSION"
            echo "tauri.android.versionCode=$VERSION_CODE"
          } > src-tauri/gen/android/app/tauri.properties

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          APK_PATH="$(find src-tauri/gen/android -name '*.apk' ! -name '*unsigned*' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No signed APK artifact found."
            exit 1
          fi
          if [[ "$APK_PATH" == *unsigned* ]]; then
            echo "Refusing to upload unsigned APK: $APK_PATH"
            exit 1
          fi

          if [ -z "${ANDROID_HOME:-}" ]; then
            echo "ANDROID_HOME is not configured."
            exit 1
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "Could not find apksigner."
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"

          gh release upload "${{ inputs.tag_name || github.ref_name }}" "$APK_PATH" --clobber
