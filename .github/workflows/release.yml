name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.publish.outputs.releaseId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # 核心：Tauri 构建发布（自动打包+上传安装包）
      - name: Build and publish Tauri release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_RELEASE_PAT || github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "微信读书个人阅读管理 ${{ inputs.tag_name || github.ref_name }}"
          releaseBody: |
            把微信读书里的阅读记录，沉淀成你的知识资产。

            这是一个本地优先的阅读工作台，统一整理书架、笔记、阅读统计与 AI 复盘，帮助你更清楚地知道接下来读什么、复盘什么、输出什么。

            ## 本次版本

            - 新增本地书库 Markdown 导入，支持 `.md` / `.markdown` 文件、front matter 标题/作者识别和本地书架格式筛选。
            - 优化本地阅读器 Markdown 阅读体验，支持标题、引用、列表、分隔线和代码块基础渲染，同时保持划线、想法、AI 提问和导出基于原文偏移稳定工作。
            - 完善本地书架与微信书架来源隔离，同名书默认展示为两个来源版本，不自动合并阅读进度、划线、想法或 AI 记录。
            - 增强微信书架长列表与归档管理，降低大量书籍场景下的列表压力，并保持归档状态与书架主体数据分离。
            - 增强 AI Provider 设置，支持常用预设、模型刷新、结构化输出兼容检测和手动输入兜底，降低不同 OpenAI 兼容服务的配置成本。
            - 补充本地阅读器、Markdown 解析、书架长列表和 Provider 兼容相关测试覆盖。

            ## 更新说明

            - 版本：v1.0.4
            - 适用平台：Windows x64
            - 更新方式：设置 > 应用更新

            ## 回滚

            - 如更新异常，请回退到上一版安装包
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle/nsis"
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $sigFile) {
            Write-Host "NSIS bundle directory contents:"
            Get-ChildItem -Path $bundleDir | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
            throw "Could not find Windows updater signature (*.exe.sig)."
          }

          $release = gh api "repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $exeAsset = $release.assets |
            Where-Object { $_.name -match '\.exe$' } |
            Sort-Object name |
            Select-Object -First 1

          if (-not $exeAsset) {
            Write-Host "Release assets returned by GitHub API:"
            $release.assets | Select-Object name, browser_download_url | Format-Table -AutoSize
            throw "Could not find uploaded Windows installer asset (*.exe) in the GitHub release."
          }

          $version = [string] $release.tag_name
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $notes = [string] $release.body
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "详见 GitHub Release 页面。"
          }

          $pubDate = if ([string]::IsNullOrWhiteSpace($release.published_at)) {
            [DateTime]::UtcNow.ToString("o")
          } else {
            [DateTime]::Parse($release.published_at).ToUniversalTime().ToString("o")
          }

          $latestJsonPath = Join-Path $PWD "src-tauri/target/release/bundle/latest.json"
          $latestJson = [ordered]@{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()
                url = $exeAsset.browser_download_url
              }
            }
          }

          $latestJson | ConvertTo-Json -Depth 10 | Set-Content -Path $latestJsonPath -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content -Path $latestJsonPath

      - name: Upload latest.json to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" "./src-tauri/target/release/bundle/latest.json" --clobber

  # Android 构建任务（保持不变，正确）
  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    needs: release-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure Android signing
        run: |
          mkdir -p src-tauri/gen/android
          printf 'keyAlias=%s\n' "${{ secrets.ANDROID_KEY_ALIAS }}" > src-tauri/gen/android/keystore.properties
          printf 'password=%s\n' "${{ secrets.ANDROID_KEY_PASSWORD }}" >> src-tauri/gen/android/keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/upload-keystore.jks"
          printf 'storeFile=%s\n' "$RUNNER_TEMP/upload-keystore.jks" >> src-tauri/gen/android/keystore.properties

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="$(find src-tauri/gen/android -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK artifact found."
            exit 1
          fi
          gh release upload "${{ inputs.tag_name || github.ref_name }}" "$APK_PATH" --clobber
