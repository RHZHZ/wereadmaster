name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.publish.outputs.releaseId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release notes
        id: release_notes
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $notesPath = Join-Path $PWD "docs/release-notes-$env:RELEASE_TAG.json"
          if (-not (Test-Path -Path $notesPath)) {
            throw "Missing release notes JSON: $notesPath"
          }

          $releaseNotes = Get-Content -Path $notesPath -Raw | ConvertFrom-Json
          if ([string] $releaseNotes.version -ne $env:RELEASE_TAG) {
            throw "Release notes version '$($releaseNotes.version)' does not match tag '$env:RELEASE_TAG'."
          }

          $markdown = [string] $releaseNotes.releaseNotesMarkdown
          if ([string]::IsNullOrWhiteSpace($markdown)) {
            throw "releaseNotesMarkdown is required in $notesPath."
          }

          $body = @"
          把微信读书里的阅读记录，沉淀成你的知识资产。

          这是一个本地优先的阅读工作台，统一整理书架、笔记、阅读统计与 AI 复盘，帮助你更清楚地知道接下来读什么、复盘什么、输出什么。

          $markdown

          ## 回滚

          - 如更新异常，请回退到上一版安装包
          "@

          $delimiter = "RELEASE_NOTES_$([guid]::NewGuid().ToString('N'))"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter

      # 核心：Tauri 构建发布（自动打包+上传安装包）
      - name: Build and publish Tauri release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.TAURI_RELEASE_PAT || github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "微信读书个人阅读管理 ${{ inputs.tag_name || github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false

      - name: Upload normalized Windows installer asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $version = [string] $env:RELEASE_TAG
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle/nsis"
          $exeFile = Get-ChildItem -Path $bundleDir -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exeFile) {
            throw "Could not find Windows installer asset (*.exe)."
          }
          if (-not $sigFile) {
            throw "Could not find Windows updater signature (*.exe.sig)."
          }

          $normalizedExePath = Join-Path $bundleDir "wereadmaster_${version}_x64-setup.exe"
          $normalizedSigPath = "$normalizedExePath.sig"
          Copy-Item -Path $exeFile.FullName -Destination $normalizedExePath -Force
          Copy-Item -Path $sigFile.FullName -Destination $normalizedSigPath -Force

          gh release upload "$env:RELEASE_TAG" "$normalizedExePath" "$normalizedSigPath" --clobber

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle/nsis"
          $sigFile = Get-ChildItem -Path $bundleDir -Filter "*.exe.sig" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $sigFile) {
            Write-Host "NSIS bundle directory contents:"
            Get-ChildItem -Path $bundleDir | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
            throw "Could not find Windows updater signature (*.exe.sig)."
          }

          $release = gh api "repos/${{ github.repository }}/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $version = [string] $release.tag_name
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $expectedInstallerName = "wereadmaster_${version}_x64-setup.exe"
          $exeAsset = $release.assets |
            Where-Object { $_.name -eq $expectedInstallerName } |
            Select-Object -First 1

          if (-not $exeAsset) {
            Write-Host "Release assets returned by GitHub API:"
            $release.assets | Select-Object name, browser_download_url | Format-Table -AutoSize
            throw "Could not find uploaded Windows installer asset '$expectedInstallerName' in the GitHub release."
          }

          $notesPath = Join-Path $PWD "docs/release-notes-$env:RELEASE_TAG.json"
          $releaseNotes = Get-Content -Path $notesPath -Raw | ConvertFrom-Json
          $notes = [string] $releaseNotes.releaseNotesMarkdown
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = [string] $release.body
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "详见 GitHub Release 页面。"
          }

          $pubDate = if ([string]::IsNullOrWhiteSpace($release.published_at)) {
            [DateTime]::UtcNow.ToString("o")
          } else {
            [DateTime]::Parse($release.published_at).ToUniversalTime().ToString("o")
          }

          $latestJsonPath = Join-Path $PWD "src-tauri/target/release/bundle/latest.json"
          $latestJson = [ordered]@{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()
                url = $exeAsset.browser_download_url
              }
            }
          }

          $latestJson | ConvertTo-Json -Depth 10 | Set-Content -Path $latestJsonPath -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content -Path $latestJsonPath

      - name: Upload latest.json to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" "./src-tauri/target/release/bundle/latest.json" --clobber

  # Android 构建任务（签名后上传 APK）
  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    needs: release-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "$ANDROID_KEY_ALIAS" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "$ANDROID_KEY_PASSWORD" ] || missing+=("ANDROID_KEY_PASSWORD")
          [ -n "$ANDROID_STORE_PASSWORD" ] || missing+=("ANDROID_STORE_PASSWORD")
          [ -n "$ANDROID_KEY_BASE64" ] || missing+=("ANDROID_KEY_BASE64")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing Android signing secrets: ${missing[*]}"
            exit 1
          fi

          mkdir -p src-tauri/gen/android
          printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS" > src-tauri/gen/android/keystore.properties
          printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties
          printf 'storePassword=%s\n' "$ANDROID_STORE_PASSWORD" >> src-tauri/gen/android/keystore.properties
          printf '%s' "$ANDROID_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          printf 'storeFile=%s\n' "$RUNNER_TEMP/upload-keystore.jks" >> src-tauri/gen/android/keystore.properties

      - name: Sync Android version from release tag
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Android release tag must use semantic version format, got: $RELEASE_TAG"
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$((major * 1000000 + minor * 1000 + patch))
          {
            echo "// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
            echo "tauri.android.versionName=$VERSION"
            echo "tauri.android.versionCode=$VERSION_CODE"
          } > src-tauri/gen/android/app/tauri.properties

      - name: Patch missing Android consumer ProGuard files
        run: |
          set -euo pipefail

          cargo fetch --manifest-path "src-tauri/Cargo.toml"

          CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          patched=0
          while IFS= read -r build_file; do
            android_dir="$(dirname "$build_file")"
            consumer_file="$android_dir/consumer-rules.pro"
            if grep -q 'consumerProguardFiles("consumer-rules.pro")' "$build_file" && [ ! -f "$consumer_file" ]; then
              printf '# Empty consumer ProGuard rules for Android plugin packages that reference this file.\n' > "$consumer_file"
              patched=$((patched + 1))
              echo "Created $consumer_file"
            fi
          done < <(find "$CARGO_HOME/registry/src" -path '*/tauri-plugin-*/android/build.gradle.kts' -print)

          echo "Patched $patched Android plugin consumer ProGuard file(s)."

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          APK_PATH="$(find src-tauri/gen/android -name '*.apk' ! -name '*unsigned*' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No signed APK artifact found."
            exit 1
          fi
          if [[ "$APK_PATH" == *unsigned* ]]; then
            echo "Refusing to upload unsigned APK: $APK_PATH"
            exit 1
          fi

          if [ -z "${ANDROID_HOME:-}" ]; then
            echo "ANDROID_HOME is not configured."
            exit 1
          fi

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "Could not find apksigner."
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"

          gh release upload "${{ inputs.tag_name || github.ref_name }}" "$APK_PATH" --clobber
