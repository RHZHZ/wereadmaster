name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.publish.outputs.releaseId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "个人阅读管理 ${{ inputs.tag_name || github.ref_name }}"
          releaseBody: "请在发布说明中补充本次变更、兼容性和回滚说明。"
          releaseDraft: false
          prerelease: false

  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    needs: release-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure Android signing
        run: |
          mkdir -p src-tauri/gen/android
          printf 'keyAlias=%s\n' "${{ secrets.ANDROID_KEY_ALIAS }}" > src-tauri/gen/android/keystore.properties
          printf 'password=%s\n' "${{ secrets.ANDROID_KEY_PASSWORD }}" >> src-tauri/gen/android/keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/upload-keystore.jks"
          printf 'storeFile=%s\n' "$RUNNER_TEMP/upload-keystore.jks" >> src-tauri/gen/android/keystore.properties

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ secrets.TAURI_RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="$(find src-tauri/gen/android -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK artifact found."
            exit 1
          fi
          gh release upload "${{ inputs.tag_name || github.ref_name }}" "$APK_PATH" --clobber
